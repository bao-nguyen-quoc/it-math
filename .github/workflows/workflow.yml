name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Test with coverage
      run: npm run test:coverage

    - name: Upload coverage reports to Codecov          # (1) Codecov badge & dashboard
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage/lcov.info
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Report coverage summary in Job Summary      # (2) Hiện thẳng trong GitHub Actions UI
      uses: davelosert/vitest-coverage-report-action@v2
      if: always()
      with:
        json-summary-path: ./coverage/coverage-summary.json
        json-final-path: ./coverage/coverage-final.json

    - name: Upload coverage artifact                    # (3) Download coverage HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: coverage/
        retention-days: 7